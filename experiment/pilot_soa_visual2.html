<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="robots" content="noindex,nofollow">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>iFont パイロット: 視覚・連続する文字の間隔掃引（乙課題）</title>
<style>
  :root { color-scheme: light; }
  body { font-family: system-ui, sans-serif; margin: 0; background:#f4f5f8; color:#1b2030; }
  #app { max-width: 720px; margin: 0 auto; padding: 20px; }
  .card { background:#fff; border:1px solid #e3e6ee; border-radius:10px; padding:18px; }
  h1 { font-size: 18px; }
  button.primary { font-size:16px; padding:10px 20px; border-radius:8px; border:0; background:#1E2A5E; color:#fff; cursor:pointer; }
  #stage { display:flex; align-items:center; justify-content:center; height:300px; }
  canvas#stim { background:#fff; border:1px solid #ddd; }
  #grid { display:grid; grid-template-columns: repeat(5, 1fr); gap:6px; margin-top:14px; }
  .kana { font-size:20px; padding:10px 0; border:1px solid #cdd3e6; border-radius:6px; background:#fbfcff; cursor:pointer; }
  .kana:hover { background:#eef2ff; } .kana:active{ background:#dde6ff; }
  .spacer { visibility:hidden; }
  .muted { color:#6b7280; font-size:13px; }
  .ask { font-weight:700; color:#1E2A5E; }
  table { border-collapse:collapse; width:100%; font-size:14px; }
  td,th { border:1px solid #e3e6ee; padding:6px 8px; text-align:center; }
</style>
</head>
<body>
<div id="app"><div class="card" id="screen"></div></div>
<script src="prod_common.js"></script>
<script src="pilot_soa_visual2.js"></script>
</body>
</html>
